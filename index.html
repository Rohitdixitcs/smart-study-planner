<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>📚 Smart Study Planner</h1>
            <p>Organize your studies and achieve your goals</p>
        </header>

        <div class="dashboard">

            <div class="card">
                <h2>Total Tasks</h2>
                <p id="totalTasks">0</p>
            </div>

            <div class="card">
                <h2>Completed</h2>
                <p id="completedTasks">0</p>
            </div>

            <div class="card">
                <h2>Progress</h2>
                <p id="progressPercent">0%</p>
            </div>

        </div>

        <div class="task-section">
            <input type="text" id="taskInput" placeholder="Enter study task">
            <button id="addTaskBtn">Add Task</button>
        </div>

        <ul id="taskList"></ul>

    </div>

<script src="script.js"></script>
</body>
</html>
