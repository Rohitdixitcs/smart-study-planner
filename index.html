<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>📚 Smart Study Planner</h1>
            <p>Organize your studies and achieve your goals</p>

            <button id="themeToggle">
                🌙 Dark Mode
            </button>
        </header>

        <div class="dashboard">

            <div class="card">
                <h2>Total Tasks</h2>
                <p id="totalTasks">0</p>
            </div>

            <div class="card">
                <h2>Completed</h2>
                <p id="completedTasks">0</p>
            </div>

            <div class="card">
                <h2>Progress</h2>
                <p id="progressPercent">0%</p>
            </div>

        </div>

        <!-- Motivational Quotes -->

        <div class="quote-card">

            <h2>💡 Daily Motivation</h2>

            <p id="quoteText">
                Success is the sum of small efforts repeated day in and day out.
            </p>

            <button id="newQuoteBtn">
                New Quote
            </button>

        </div>

        <!-- Study Streak -->

        <div class="streak-card">

            <h2>🔥 Study Streak</h2>

            <p id="streakCount">
                0 Days
            </p>

            <button id="studyTodayBtn">
                Studied Today
            </button>

        </div>

        <!-- Progress Bar -->

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <!-- Exam Countdown -->

        <div class="countdown-card">

            <h2>📅 Exam Countdown</h2>

            <input
                type="date"
                id="examDate"
            >

            <button onclick="calculateCountdown()">
                Calculate
            </button>

            <h3 id="daysLeft">
                Select Exam Date
            </h3>

        </div>

        <!-- Subject Management -->

        <div class="subject-card">

            <h2>📖 Subjects</h2>

            <div class="subject-input">

                <input
                    type="text"
                    id="subjectInput"
                    placeholder="Enter subject name"
                >

                <button id="addSubjectBtn">
                    Add Subject
                </button>

            </div>

            <ul id="subjectList"></ul>

        </div>

        <!-- Task Management -->

        <div class="task-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter study task..."
            >

            <button id="addTaskBtn">
                Add Task
            </button>

        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
